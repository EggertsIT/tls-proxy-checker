name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"
          - "3.14"

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,build]"

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-test command
        run: |
          python -m tls_proxy_checker.cli --version
          python -m tls_proxy_checker.cli --help > /dev/null

      - name: Build source and wheel distributions
        if: matrix.python-version == '3.14'
        run: python -m build

      - name: Run static security scan
        if: matrix.python-version == '3.14'
        run: python -m bandit -q -r src scripts

      - name: Audit dependencies
        if: matrix.python-version == '3.14'
        run: python -m pip_audit

  linux-compatibility:
    name: Linux glibc 2.17
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate build scripts
        run: bash -n scripts/run_linux_release_build.sh scripts/build_linux_release.sh

      - name: Build on the glibc 2.17 baseline
        run: bash scripts/run_linux_release_build.sh

      - name: Smoke-test on the GitHub runner
        run: |
          ./release-assets/tls-proxy-checker-linux-x86_64 --version
          ./release-assets/tls-proxy-checker-linux-x86_64 --help > /dev/null

      - name: Verify release checksums
        working-directory: release-assets
        run: sha256sum --check SHA256SUMS

      - name: Report compatibility evidence
        run: |
          jq --exit-status '
            .within_maximum == true and
            .maximum_allowed_glibc == "2.17" and
            .required_glibc != null
          ' release-assets/glibc-requirements.json
          jq --exit-status '
            .build.python_distribution as $python |
            ($python.url | type) == "string" and
            ($python.url | startswith("https://")) and
            ($python.sha256 | type) == "string" and
            ($python.sha256 | test("^[0-9a-f]{64}$"))
          ' release-assets/BUILDINFO.json
          cat release-assets/glibc-requirements.json >> "${GITHUB_STEP_SUMMARY}"
