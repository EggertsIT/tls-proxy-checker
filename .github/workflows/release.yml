name: Release

"on":
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-x86-64:
    name: Linux x86-64 (glibc 2.17)
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify signed release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}")"
          object_type="$(printf '%s' "${tag_ref}" | jq -r '.object.type')"
          tag_sha="$(printf '%s' "${tag_ref}" | jq -r '.object.sha')"
          if [[ "${object_type}" != "tag" ]]; then
            echo "Release tag must be an annotated, signed tag." >&2
            exit 1
          fi
          tag_object="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}")"
          verified="$(printf '%s' "${tag_object}" | jq -r '.verification.verified')"
          reason="$(printf '%s' "${tag_object}" | jq -r '.verification.reason')"
          if [[ "${verified}" != "true" ]]; then
            echo "GitHub did not verify the release tag signature: ${reason}" >&2
            exit 1
          fi

      - name: Build release assets on glibc 2.17
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: bash scripts/run_linux_release_build.sh

      - name: Smoke-test release binary on the GitHub runner
        run: |
          ./release-assets/tls-proxy-checker-linux-x86_64 --version
          ./release-assets/tls-proxy-checker-linux-x86_64 --help > /dev/null
          jq --exit-status '
            .within_maximum == true and
            .maximum_allowed_glibc == "2.17"
          ' release-assets/glibc-requirements.json

      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: release-assets/SHA256SUMS

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --verify-tag \
            --generate-notes \
            --title "TLS Proxy Checker ${GITHUB_REF_NAME}"
